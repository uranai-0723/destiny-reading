<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="縁と魂の恋愛リーディング - LiLith Destiny">
<meta property="og:description" content="相手の気持ち、曖昧な関係、忘れられない恋。その苦しさにある感情と縁の流れを読み解きます。">
<meta property="og:type" content="website">
<title>縁と魂の恋愛リーディング - LiLith Destiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --night: #090711;
  --ink: #14101d;
  --panel: rgba(18, 13, 28, 0.86);
  --panel-soft: rgba(255, 247, 250, 0.055);
  --rose: #f0a2b5;
  --rose-deep: #9d314c;
  --moon: #e9ddc7;
  --violet: #b8a4ff;
  --text: #fff7fb;
  --muted: rgba(255, 239, 246, 0.76);
  --dim: rgba(255, 239, 246, 0.48);
  --line: rgba(255, 229, 238, 0.16);
}

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 70% 55% at 50% -12%, rgba(100, 42, 120, 0.78), transparent 62%),
    radial-gradient(ellipse 58% 42% at 8% 72%, rgba(120, 36, 70, 0.5), transparent 58%),
    radial-gradient(ellipse 48% 36% at 95% 40%, rgba(48, 44, 130, 0.5), transparent 55%),
    linear-gradient(180deg, #080711 0%, #120a14 48%, #080711 100%);
  color: var(--text);
  font-family: "Noto Serif JP", serif;
  -webkit-font-smoothing: antialiased;
}

#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.shell {
  position: relative;
  z-index: 1;
  width: min(100%, 520px);
  margin: 0 auto;
  padding: 32px 20px 92px;
}

.top {
  display: grid;
  gap: 22px;
  padding: 18px 0 22px;
}

.brand {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.brand-name {
  font-family: "Cormorant Garamond", serif;
  font-size: 13px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(255, 236, 244, 0.74);
}

.moon-mark {
  width: 48px;
  height: 48px;
  filter: drop-shadow(0 0 18px rgba(240, 162, 181, 0.55));
}

.hero {
  display: grid;
  gap: 16px;
  padding: 8px 0 4px;
}

.eyebrow {
  display: inline-flex;
  width: fit-content;
  border: 1px solid rgba(240, 162, 181, 0.38);
  border-radius: 999px;
  padding: 7px 13px;
  background: rgba(157, 49, 76, 0.18);
  color: rgba(255, 220, 230, 0.92);
  font-size: 12px;
  letter-spacing: 0.12em;
}

h1 {
  font-family: "Cormorant Garamond", "Noto Serif JP", serif;
  font-size: clamp(33px, 10vw, 54px);
  font-weight: 400;
  font-style: italic;
  line-height: 1.12;
  letter-spacing: 0;
  text-shadow: 0 0 32px rgba(184, 164, 255, 0.48), 0 0 18px rgba(240, 162, 181, 0.38);
}

.lead {
  color: var(--muted);
  font-size: 14px;
  line-height: 2;
  letter-spacing: 0.04em;
}

.pain-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  margin-top: 2px;
}

.pain {
  min-height: 46px;
  border: 1px solid rgba(255, 229, 238, 0.13);
  border-radius: 6px;
  padding: 10px 11px;
  background: rgba(255, 247, 250, 0.045);
  color: rgba(255, 240, 246, 0.84);
  font-size: 12px;
  line-height: 1.55;
}

.step { display: none; }
.step.active {
  display: block;
  animation: rise 0.45s ease;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,0.07), transparent 42%), var(--panel);
  box-shadow: 0 26px 90px rgba(0, 0, 0, 0.32);
}

.card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240, 162, 181, 0.78), transparent);
}

.card-inner {
  position: relative;
  z-index: 1;
  padding: 24px 20px;
}

.section-title {
  margin-bottom: 10px;
  font-family: "Cormorant Garamond", "Noto Serif JP", serif;
  font-size: 25px;
  font-style: italic;
  font-weight: 400;
  line-height: 1.35;
}

.section-copy {
  margin-bottom: 22px;
  color: var(--muted);
  font-size: 13px;
  line-height: 2;
}

.field {
  display: grid;
  gap: 9px;
  margin-bottom: 18px;
}

.field label, .group-label {
  color: rgba(255, 224, 234, 0.72);
  font-size: 12px;
  letter-spacing: 0.12em;
}

input, select, textarea {
  width: 100%;
  border: 1px solid rgba(255, 229, 238, 0.16);
  border-radius: 6px;
  outline: none;
  background: rgba(8, 7, 17, 0.72);
  color: var(--text);
  font: 400 15px "Noto Serif JP", serif;
}

input, select { min-height: 48px; padding: 0 13px; }
textarea { min-height: 86px; resize: vertical; padding: 13px; line-height: 1.8; }

input:focus, select:focus, textarea:focus {
  border-color: rgba(240, 162, 181, 0.62);
  box-shadow: 0 0 0 3px rgba(240, 162, 181, 0.1);
}

.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  margin: 9px 0 20px;
}

.choice {
  position: relative;
  min-height: 48px;
}

.choice input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.choice span {
  display: grid;
  min-height: 48px;
  place-items: center;
  border: 1px solid rgba(255, 229, 238, 0.16);
  border-radius: 6px;
  background: rgba(255, 247, 250, 0.045);
  color: rgba(255, 240, 246, 0.82);
  font-size: 13px;
  text-align: center;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}

.choice input:checked + span {
  border-color: rgba(240, 162, 181, 0.72);
  background: rgba(157, 49, 76, 0.34);
  color: #fff;
}

.btn {
  display: inline-flex;
  width: 100%;
  min-height: 56px;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(240, 162, 181, 0.72);
  border-radius: 6px;
  background: linear-gradient(135deg, rgba(157, 49, 76, 0.92), rgba(98, 54, 130, 0.9));
  color: #fff8fb;
  cursor: pointer;
  font: 500 14px "Noto Serif JP", serif;
  letter-spacing: 0.13em;
  text-align: center;
  text-decoration: none;
  transition: transform 0.2s, filter 0.2s;
}

.btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

.btn.secondary {
  margin-top: 10px;
  border-color: rgba(255, 229, 238, 0.18);
  background: rgba(255, 247, 250, 0.035);
  color: rgba(255, 240, 246, 0.86);
}

.note {
  margin-top: 12px;
  color: var(--dim);
  font-size: 11px;
  line-height: 1.8;
  text-align: center;
}

.loading {
  display: grid;
  place-items: center;
  min-height: 360px;
  text-align: center;
}

.sigil {
  width: 92px;
  height: 92px;
  margin: 0 auto 28px;
  animation: spin 12s linear infinite;
  filter: drop-shadow(0 0 22px rgba(240, 162, 181, 0.5));
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  color: rgba(255, 224, 234, 0.78);
  font-family: "Cormorant Garamond", serif;
  font-size: 20px;
  font-style: italic;
  letter-spacing: 0.08em;
}

.dots::after {
  content: "";
  animation: dots 1.8s steps(4, end) infinite;
}

@keyframes dots {
  25% { content: "・"; }
  50% { content: "・・"; }
  75% { content: "・・・"; }
}

.result-head {
  display: grid;
  gap: 10px;
  margin-bottom: 18px;
}

.number-row {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
}

.big-number {
  color: var(--moon);
  font-family: "Cormorant Garamond", serif;
  font-size: 74px;
  font-weight: 400;
  line-height: 0.92;
  text-shadow: 0 0 30px rgba(233, 221, 199, 0.35);
}

.tag {
  display: inline-flex;
  width: fit-content;
  border: 1px solid rgba(184, 164, 255, 0.38);
  border-radius: 999px;
  padding: 6px 11px;
  background: rgba(184, 164, 255, 0.1);
  color: rgba(229, 219, 255, 0.88);
  font-size: 11px;
  letter-spacing: 0.1em;
}

.reading-grid {
  display: grid;
  gap: 12px;
}

.reading {
  border: 1px solid rgba(255, 229, 238, 0.13);
  border-radius: 7px;
  padding: 16px 15px;
  background: rgba(255, 247, 250, 0.045);
}

.reading h3 {
  margin-bottom: 8px;
  color: rgba(255, 227, 235, 0.95);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.06em;
}

.reading p {
  color: var(--muted);
  font-size: 13px;
  line-height: 2;
}

.oracle {
  display: flex;
  gap: 14px;
  align-items: center;
  margin: 18px 0;
  border: 1px solid rgba(240, 162, 181, 0.18);
  border-radius: 8px;
  padding: 14px;
  background: rgba(157, 49, 76, 0.12);
}

.oracle-card {
  width: 64px;
  height: 88px;
  flex: 0 0 64px;
  border: 1px solid rgba(255, 229, 238, 0.28);
  border-radius: 7px;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 50% 38%, rgba(240, 162, 181, 0.45), transparent 35%),
    linear-gradient(160deg, rgba(184, 164, 255, 0.25), rgba(157, 49, 76, 0.25));
}

.oracle-card svg { width: 36px; height: 36px; }

.oracle-text strong {
  display: block;
  margin-bottom: 5px;
  color: #fff;
  font-size: 14px;
}

.oracle-text span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.8;
}

.line-box {
  margin-top: 18px;
  border: 1px solid rgba(112, 220, 123, 0.32);
  border-radius: 8px;
  padding: 18px 16px;
  background: rgba(33, 130, 55, 0.12);
}

.line-box h3 {
  margin-bottom: 8px;
  color: rgba(226, 255, 229, 0.96);
  font-size: 16px;
  font-weight: 500;
}

.line-box p {
  margin-bottom: 14px;
  color: rgba(232, 255, 234, 0.78);
  font-size: 13px;
  line-height: 1.9;
}

.line-btn {
  border-color: rgba(96, 220, 108, 0.62);
  background: linear-gradient(135deg, rgba(30, 160, 60, 0.94), rgba(21, 120, 55, 0.94));
}

.reset {
  display: block;
  margin: 18px auto 0;
  border: 0;
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font: 400 12px "Noto Serif JP", serif;
  letter-spacing: 0.12em;
}

/* Visual refresh: moonlit LiLith world */

<body>
<canvas id="stars" aria-hidden="true"></canvas>

<main class="shell">
  <header class="top">
    <div class="brand">
      <div class="brand-name">LiLith Destiny</div>
      <svg class="moon-mark" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <path d="M42.5 9.5C31 13 23.3 23.1 23.3 35.2c0 8.9 4.3 16.8 10.9 21.7C21.6 55.9 12 45.5 12 32.8 12 18.9 23.2 7.6 37 7.6c1.9 0 3.6.2 5.5.9Z" fill="#e9ddc7"/>
        <path d="M46 21l2.8 6.2 6.2 2.8-6.2 2.8L46 39l-2.8-6.2L37 30l6.2-2.8L46 21Z" stroke="#f0a2b5" stroke-width="1.2"/>
      </svg>
    </div>

    <section class="hero">
      <span class="eyebrow">無料診断 / 数秘とオラクル</span>
      <h1>縁と魂の<br>恋愛リーディング</h1>
      <p class="lead">苦しい恋には、理由がある。相手の気持ちが分からない夜も、連絡を待ち続けてしまう時間も、あなたが重いからではありません。</p>
      <div class="pain-list" aria-label="よくある恋の悩み">
        <div class="pain">相手の気持ちが分からない</div>
        <div class="pain">連絡を待ち続けてしまう</div>
        <div class="pain">曖昧な関係が終わらない</div>
        <div class="pain">忘れたいのに忘れられない</div>
      </div>
    </section>
  </header>

  <section class="step active" id="step-form">
    <div class="card">
      <div class="card-inner">
        <h2 class="section-title">今の恋に起きている<br>感情と縁の流れを読む</h2>
        <p class="section-copy">誕生日から誕生数を出し、今の恋の苦しさ、相手との縁、3ヶ月の流れ、あなたが本当に求める愛の形を鑑定します。</p>

        <div class="field">
          <label for="birthdate">あなたの誕生日</label>
          <input id="birthdate" type="date" required>
        </div>

        <div class="field">
          <label for="name">お名前またはニックネーム</label>
          <input id="name" type="text" placeholder="例：リリス" autocomplete="name">
        </div>

    function resize() {
      var ratio = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * ratio);
      canvas.height = Math.floor(window.innerHeight * ratio);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      stars = Array.from({ length: 90 }, function () {
        return {
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.15 + 0.25,
          a: Math.random() * Math.PI * 2,
          s: Math.random() * 0.018 + 0.006
        };
      });
    }

    function tick() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      stars.forEach(function (star) {
        star.a += star.s;
        var alpha = 0.18 + Math.abs(Math.sin(star.a)) * 0.62;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,239,246," + alpha + ")";
        ctx.fill();
      });
      requestAnimationFrame(tick);
    }

    window.addEventListener("resize", resize);
    tick();
  }
